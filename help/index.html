<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="base-path" content="." />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/i18n.js" defer></script>
    <title>GoCAKs - Help</title>
  </head>
  <body>
    <div class="page">
      <h1 class="page-title" data-i18n="help.title"></h1>
      <a href="story.html" class="hero-card">
        <img class="hero-card-bg" src="images/help-header.png" alt="" />
        <div class="hero-card-text" data-i18n="help.story"></div>
      </a>
      <a href="games.html" class="hero-card">
        <img class="hero-card-bg" src="images/game-help-header.png" alt="" />
        <div class="hero-card-text" data-i18n="help.game"></div>
      </a>
      <a href="codes.html" class="hero-card">
        <img class="hero-card-bg" src="images/genes-help-header.png" alt="" />
        <div class="hero-card-text" data-i18n="help.codes"></div>
      </a>
      <a href="episodes.html" class="hero-card">
        <img
          class="hero-card-bg"
          src="images/episodes-help-header.png"
          alt=""
        />
        <div class="hero-card-text" data-i18n="help.episodes"></div>
      </a>
      <a
        href="pentan-showcase.html"
        class="hero-card"
        style="background: var(--bg-card)"
      >
        <img
          class="hero-card-bg"
          src="images/pentan-showcase-header.png"
          alt=""
        />
        <div class="hero-card-text" data-i18n="showcase.pentan.title">
          PENTAN Showcase
        </div>
      </a>
      <a
        href="grid-showcase.html"
        class="hero-card"
        style="background: var(--bg-card)"
      >
        <img
          class="hero-card-bg"
          src="images/grid-showcase-header.png"
          alt=""
        />
        <div class="hero-card-text" data-i18n="showcase.grid.title">
          Grid Showcase
        </div>
      </a>
      <a
        href="videos.html"
        class="hero-card"
        style="background: var(--bg-card)"
      >
        <img class="hero-card-bg" src="images/videos-header.png" alt="" />
        <div class="hero-card-text" data-i18n="help.videos">Videos</div>
      </a>
      <a href="release-notes.html" class="hero-card">
        <img
          class="hero-banner-bg"
          src="images/release-note-header.png"
          alt=""
        />
        <div class="hero-card-text" data-i18n="help.releasenotes">
          Release Notes
        </div>
      </a>
      <a href="faq.html" class="hero-card">
        <img class="hero-card-bg" src="images/faq.png" alt="" />
        <div class="hero-card-text" data-i18n="help.faq"></div>
      </a>
    </div>
  </body>
</html>
